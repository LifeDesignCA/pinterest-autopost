name: Update Pinterest RSS Feed

on:
  push:
    paths:
      - 'pinterest_final_corrigé_complet.csv' # Se lance si tu changes le CSV
  schedule:
    - cron: '0 0 * * *' # Se lance aussi tous les jours à minuit
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas

      - name: Generate RSS
        run: python generate_rss.py

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add feed.xml
          git commit -m "Update RSS feed" || exit 0
          git push
